<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dark benchmarks</title>
<style>
body { font-family: -apple-system, system-ui, sans-serif; max-width: 800px; margin: 2em auto; padding: 0 1em; }
h1 { margin: 0 0 0.2em 0; }
.meta { color: #666; font-size: 0.9em; margin-bottom: 1.5em; }
table { border-collapse: collapse; width: 100%; }
th, td { padding: 0.4em 0.8em; text-align: left; border-bottom: 1px solid #eee; }
th { background: #fafafa; font-weight: 600; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
.scenario { font-weight: 500; }
.note { color: #888; font-size: 0.85em; }
.warn { color: #b80; }
</style>
</head>
<body>
<h1>Dark benchmarks</h1>
<div class="meta" id="meta">loading…</div>
<table>
  <thead>
    <tr><th>scenario</th><th class="num">input bytes</th><th class="num">overhead</th><th class="num">alloc bytes</th><th class="num">elapsed ms</th><th class="num">dval nodes</th><th class="note">note</th></tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
function fmt(n) { return n.toLocaleString(); }
function overhead(allocBytes, inputBytes) {
  if (inputBytes <= 0 || allocBytes < 0) return "—";
  return (allocBytes / inputBytes).toFixed(2) + "x";
}

fetch("results/latest.json")
  .then(r => r.json())
  .then(data => {
    document.getElementById("meta").textContent =
      data.timestamp + " · commit " + data.commit.slice(0, 12);
    const rows = data.results.map(r => `
      <tr>
        <td class="scenario">${r.scenario}</td>
        <td class="num">${fmt(r.inputBytes)}</td>
        <td class="num">${overhead(r.allocBytes, r.inputBytes)}</td>
        <td class="num">${r.allocBytes < 0 ? "—" : fmt(r.allocBytes)}</td>
        <td class="num">${r.elapsedMs < 0 ? "—" : fmt(r.elapsedMs)}</td>
        <td class="num">${r.dvalNodes < 0 ? "—" : fmt(r.dvalNodes)}</td>
        <td class="note ${r.note === "ok" || r.note === "simulated-handler" ? "" : "warn"}">${r.note}</td>
      </tr>
    `).join("");
    document.getElementById("rows").innerHTML = rows;
  })
  .catch(e => {
    document.getElementById("meta").innerHTML =
      '<span class="warn">failed to load results/latest.json: ' + e + "</span>";
  });
</script>
</body>
</html>
